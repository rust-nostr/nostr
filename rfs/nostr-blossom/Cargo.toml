[package]
name = "nostr-blossom"
version = "0.45.0-alpha.3"
edition.workspace = true
description = "A library for interacting with the Blossom protocol"
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
readme = "README.md"
rust-version.workspace = true
keywords = ["nostr", "blossom"]

[dependencies]
base64.workspace = true
nostr = { workspace = true, features = ["std"] }
opaquerr = { workspace = true, features = ["alloc"] }
reqwest = { workspace = true, default-features = false, features = ["http2", "json", "rustls-tls"] }
serde = { workspace = true, features = ["derive"] }

[dev-dependencies]
clap = { version = "4.6", features = ["derive"] }
nostr = { workspace = true, features = ["std", "os-rng"] }
tokio = { workspace = true, features = ["full"] }
